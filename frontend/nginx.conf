# [174A-113] Config nginx para servir el SPA Vite + proxy hacia el backend.
#
# - Las rutas que empiezan con /api/, /swagger-ui/ o /api-docs/ se proxyean
#   al servicio backend (resolved via Docker DNS interno: el nombre del
#   servicio en docker-compose.yml).
# - Todo lo demás cae en index.html (history fallback de SPA).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip básico — nginx:alpine ya tiene gzip_static off, lo activamos para
    # los assets pre-comprimidos por vite si hubiera (no por defecto).
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/wasm;
    gzip_min_length 1024;

    # CRÍTICO: assets de vite tienen hash en el nombre, son inmutables.
    # Cache largo agresivo para esos archivos. Para el resto (index.html,
    # uploads, etc.) cache cortito o no-cache.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Proxy hacia el backend Rust. El nombre `app` se resuelve por DNS
    # interno de docker-compose.
    location /api/ {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade (necesario para /api/ws)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts más generosos para uploads grandes y WS de larga duración
        proxy_connect_timeout 30s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # Permitir requests grandes (uploads de samples)
        client_max_body_size 100M;
    }

    location = /swagger-ui {
        return 301 /swagger-ui/;
    }
    location /swagger-ui/ {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api-docs/ {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA history fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
