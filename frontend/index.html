<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Nakomi Studio — Agencia creativa especializada en desarrollo web, diseño UI/UX y soluciones digitales." />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <!-- [154A-6] Preload fuentes críticas para evitar FOIT y mejorar FCP -->
        <link rel="preload" as="font" href="/assets/fonts/NeueMontreal-Regular.woff2" type="font/woff2" crossorigin />
        <link rel="preload" as="font" href="/assets/fonts/NeueMontreal-Medium.woff2" type="font/woff2" crossorigin />
        <!-- [074A-14] dns-prefetch a Stripe (se usa en checkout, no en home).
             preconnect quitado: PageSpeed penaliza conexiones que no se usan en la
             pagina actual (FCP). dns-prefetch es gratuito (solo DNS, sin TCP/TLS). -->
        <link rel="dns-prefetch" href="https://js.stripe.com" />
        <title>Nakomi Studio</title>
    </head>
    <body>
        <!-- [175A-3] Loading shell dentro de #root (sin opacity:0).
             El CSS preload carga en ~0.2s y su onload quitaba el overlay ANTES de que
             React montara, dejando la página en blanco hasta t~6s (FCP=6.2s).
             Solución: shell visible dentro de #root que React reemplaza al montar.
             FCP ocurre cuando el browser renderiza este div (~0.1-0.3s).
             #fouc-overlay vacío se mantiene para el onload handler de viteDeferCss. -->
        <div id="fouc-overlay" style="display:none" aria-hidden="true"></div>
        <div id="root">
            <div style="position:fixed;inset:0;background:#0a0a0a;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center">
                <svg width="40" height="40" viewBox="0 0 40 40" aria-hidden="true">
                    <circle cx="20" cy="20" r="18" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="3"></circle>
                    <path d="M20 2a18 18 0 0 1 18 18" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round">
                        <animateTransform
                            attributeName="transform"
                            attributeType="XML"
                            type="rotate"
                            from="0 20 20"
                            to="360 20 20"
                            dur="0.8s"
                            repeatCount="indefinite"
                        ></animateTransform>
                    </path>
                </svg>
                <span style="margin-top:14px;font-size:13px;color:rgba(255,255,255,0.85);font-family:system-ui,sans-serif;letter-spacing:.06em">nakomi studio</span>
            </div>
        </div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
