<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Nakomi Studio — Agencia creativa especializada en desarrollo web, diseño UI/UX y soluciones digitales." />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <!-- [154A-6] Preload fuentes críticas para evitar FOIT y mejorar FCP -->
        <link rel="preload" as="font" href="/assets/fonts/NeueMontreal-Regular.woff2" type="font/woff2" crossorigin />
        <link rel="preload" as="font" href="/assets/fonts/NeueMontreal-Medium.woff2" type="font/woff2" crossorigin />
        <!-- [074A-14] Preconnect a Stripe (se usa en checkout) -->
        <link rel="preconnect" href="https://js.stripe.com" crossorigin />
        <link rel="dns-prefetch" href="https://js.stripe.com" />
        <title>Nakomi Studio</title>
    </head>
    <body>
        <div id="root">
            <!-- [204A-5] Skeleton inline: visible mientras React carga para evitar pantalla en blanco -->
            <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#0a0a0a;color:#fff;font-family:sans-serif">
                <div style="width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:#fff;border-radius:50%;animation:s 0.8s linear infinite"></div>
                <style>@keyframes s{to{transform:rotate(360deg)}}</style>
            </div>
        </div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
