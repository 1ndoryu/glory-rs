<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Nakomi Studio — Agencia creativa especializada en desarrollo web, diseño UI/UX y soluciones digitales." />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <!-- [154A-6] Preload fuentes críticas para evitar FOIT y mejorar FCP -->
        <link rel="preload" as="font" href="/assets/fonts/NeueMontreal-Regular.woff2" type="font/woff2" crossorigin />
        <link rel="preload" as="font" href="/assets/fonts/NeueMontreal-Medium.woff2" type="font/woff2" crossorigin />
        <!-- [074A-14] Preconnect a Stripe (se usa en checkout) -->
        <link rel="preconnect" href="https://js.stripe.com" crossorigin />
        <link rel="dns-prefetch" href="https://js.stripe.com" />
        <title>Nakomi Studio</title>
    </head>
    <body>
        <!-- [175A-1] Overlay de carga: visible hasta que el CSS asincrono cargue, previniendo FOUC.
             Tecnica: el onload del <link rel=stylesheet> remueve este overlay y revela #root.
             #root empieza con opacity:0 para que React pueda montar sin FOUC mientras CSS carga. -->
        <div id="fouc-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-family:sans-serif">
            <svg width="40" height="40" viewBox="0 0 40 40" aria-hidden="true">
                <circle cx="20" cy="20" r="18" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="3"></circle>
                <path d="M20 2a18 18 0 0 1 18 18" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round">
                    <animateTransform
                        attributeName="transform"
                        attributeType="XML"
                        type="rotate"
                        from="0 20 20"
                        to="360 20 20"
                        dur="0.8s"
                        repeatCount="indefinite"
                    ></animateTransform>
                </path>
            </svg>
        </div>
        <!-- [204A-5] React monta aqui. opacity:0 hasta que CSS cargue (ver viteDeferCss onload). -->
        <div id="root" style="opacity:0"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
