# Pedidos de prueba para el usuario cliente.
# Usa @users para client/employee, @lookup para service_id y plan_id.
# Las fases se crean en order_phases.toml referenciando estos orders por @orders:UUID.

[meta]
table = "orders"
id_field = "id"
depends_on = ["users", "services"]

[meta.casts]
id = "uuid"
client_id = "uuid"
service_id = "uuid"
plan_id = "uuid"
assigned_employee_id = "uuid"
payment_mode = "payment_mode"
status = "order_status"

# Orden 1: Diseño Web Básico - full - in_progress, asignada a empleado
[[records]]
id = "a0000001-0001-4000-8000-000000000001"
client_id = "@lookup:users:email=cliente@test.com"
service_id = "@services:diseno-de-sitios-web"
plan_id = "@lookup:service_plans:slug=basico&service_id=@services:diseno-de-sitios-web"
payment_mode = "full"
base_price_cents = 10000
discount_percent = 20
final_price_cents = 8000
currency = "USD"
status = "in_progress"
assigned_employee_id = "@lookup:users:email=empleado@test.com"
current_phase = 2
client_notes = "Quiero un diseño minimalista y moderno"

