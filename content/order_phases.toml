# Fases de los pedidos de prueba.
# Cada fase referencia su order_id desde orders.toml.
# Precios calculados según los porcentajes de service_plan_phases.

[meta]
table = "order_phases"
id_field = "id"
depends_on = ["orders"]

[meta.casts]
id = "uuid"
order_id = "uuid"
status = "phase_status"

