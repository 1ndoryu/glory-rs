# [074A-53] Pagos de prueba para las órdenes fixture.
# Usa @orders:UUID para resolver FK de order_id.
# Usa @order_phases:UUID para resolver FK de phase_id (opcional).

[meta]
table = "order_payments"
id_field = "id"
depends_on = ["orders", "order_phases"]

[meta.casts]
id = "uuid"
order_id = "uuid"
phase_id = "uuid"
status = "payment_status"
payment_mode = "payment_mode"
held_at = "timestamptz"
released_at = "timestamptz"

# Orden 1 — Diseño Web Básico (full, in_progress, $80 total con 20% desc → $64)
# Pago completo retenido (held)
[[records]]
id = "c0000001-0001-4000-8000-000000000001"
order_id = "@orders:a0000001-0001-4000-8000-000000000001"
amount_cents = 6400
currency = "USD"
status = "held"
payment_mode = "full"
stripe_payment_intent_id = "pi_test_fixture_001"
stripe_charge_id = "ch_test_fixture_001"
description = "Pago completo — Diseño Web Básico"
held_at = "2026-03-15T10:00:00Z"

