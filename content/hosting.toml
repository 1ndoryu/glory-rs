# Suscripciones de hosting de prueba para el usuario cliente.
# Usa @users:cliente@test.com para resolver el UUID del cliente.

[meta]
table = "hosting_subscriptions"
id_field = "domain"
depends_on = ["users"]

[meta.casts]

[[records]]
user_id = "@users:cliente@test.com"
