# Suscripciones VPS de prueba — cubre los estados principales del ciclo de vida.
# tier_name es FK a vps_plan_configs (vps1, vps2, vps3, vps4).
# status: pending_payment | pending_approval | provisioning | active | rejected | cancelled

[meta]
table = "vps_subscriptions"
id_field = "id"
depends_on = ["users"]

[meta.casts]
id = "uuid"
user_id = "uuid"
approved_by = "uuid"
approved_at = "timestamptz"
provisioned_at = "timestamptz"

