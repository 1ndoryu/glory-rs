# Problemas reportados en órdenes — cubre los 4 estados del enum problem_status.
# reporter_role: 'client' o 'employee' (VARCHAR, no enum).

[meta]
table = "order_problems"
id_field = "id"
depends_on = ["orders", "users"]

[meta.casts]
id = "uuid"
order_id = "uuid"
reporter_id = "uuid"
resolved_by = "uuid"
status = "problem_status"
resolved_at = "timestamptz"

# Problema 1: Orden in_progress — cliente reporta, abierto sin respuesta
[[records]]
id = "e0000001-0001-4000-8000-000000000001"
order_id = "@orders:a0000001-0001-4000-8000-000000000001"
reporter_id = "@lookup:users:email=cliente@test.com"
reporter_role = "client"
reason = "El diseño entregado no respeta la paleta de colores acordada. Los colores son completamente diferentes a los del brief original."
status = "open"

# Problema 2: Orden under_review — empleado reporta, en revisión por admin
[[records]]
id = "e0000001-0001-4000-8000-000000000002"
order_id = "@orders:a0000001-0001-4000-8000-000000000004"
reporter_id = "@lookup:users:email=empleado@test.com"
reporter_role = "employee"
reason = "El cliente no responde los mensajes desde hace 2 semanas. No podemos avanzar sin feedback en las revisiones de branding."
status = "in_review"

# Problema 3: Orden completada — problema resuelto por admin con respuesta
[[records]]
id = "e0000001-0001-4000-8000-000000000003"
order_id = "@orders:a0000001-0001-4000-8000-000000000003"
reporter_id = "@lookup:users:email=cliente@test.com"
reporter_role = "client"
reason = "El agente IA da respuestas incorrectas sobre los precios del catálogo."
admin_response = "Se actualizó el prompt del sistema con los precios correctos. Verificado y funcionando."
status = "resolved"
resolved_by = "@lookup:users:email=admin@admin.com"
resolved_at = "2026-03-10T15:00:00Z"

# Problema 4: Orden in_progress (orden 6) — problema descartado
[[records]]
id = "e0000001-0001-4000-8000-000000000004"
order_id = "@orders:a0000001-0001-4000-8000-000000000006"
reporter_id = "@lookup:users:email=empleado2@test.com"
reporter_role = "employee"
reason = "Solicito más tiempo para terminar la integración CRM. El plazo es imposible."
admin_response = "Se revisó el cronograma. El plazo acordado es realista. Continuar con el plan original."
status = "dismissed"
resolved_by = "@lookup:users:email=admin@admin.com"
resolved_at = "2026-04-08T10:00:00Z"
